[alembic]
script_location = alembic
prepend_sys_path = .

# The sqlalchemy.url here is a template — the actual connection string is
# read from Settings inside alembic/env.py so that the same DATABASE_URL
# is used for both the application and migrations.
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/resyntha

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
