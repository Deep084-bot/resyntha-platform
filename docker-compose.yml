services:
  postgres:
    image: postgres:16-alpine
    container_name: resyntha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resyntha
    # Remove ports: in production — databases are internal to the compose network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - resyntha

  redis:
    image: redis:7-alpine
    container_name: resyntha-redis
    restart: unless-stopped
    # Remove ports: in production — Redis is internal to the compose network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - resyntha

  backend:
    build:
      context: ./backend
    image: resyntha-backend
    container_name: resyntha-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      - GIT_COMMIT
      - BUILD_TIME
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; exit(0) if urllib.request.urlopen('http://localhost:8000/api/v1/live').status == 200 else exit(1)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - resyntha

  worker:
    build:
      context: ./backend
    image: resyntha-backend
    container_name: resyntha-worker
    restart: unless-stopped
    command: arq app.workers.WorkerSettings
    env_file:
      - ./backend/.env.docker
    environment:
      - GIT_COMMIT
      - BUILD_TIME
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq app.workers.WorkerSettings' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - resyntha

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    image: resyntha-frontend
    container_name: resyntha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - resyntha

volumes:
  postgres_data:
  redis_data:

networks:
  resyntha:
    driver: bridge
